<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Portfolio Manager</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <header class="topbar">
        <div class="brand">DevOps Portfolio</div>
        <nav class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/admin/login">Admin</a>
        </nav>
        <button class="dark-toggle" id="darkToggle">Dark</button>
        <button class="mobile-menu" id="mobileMenu">Menu</button>
    </header>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="flash-messages">
                    {% for category, message in messages %}
                        <div class="alert {{ category }}">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>DevOps Portfolio Manager • Local demo</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
