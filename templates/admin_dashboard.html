{% extends "base.html" %}

{% block content %}
<section class="section admin-page">
    <div class="admin-header">
        <h2>Admin Dashboard</h2>
        <div>
            <a class="button button-secondary" href="/admin/add-project">Add Project</a>
            <a class="button button-secondary" href="/admin/logout">Logout</a>
        </div>
    </div>
    <div class="card-grid admin-grid">
        {% if projects %}
            {% for project in projects %}
                <div class="card project-card admin-card">
                    <h3>{{ project.title }}</h3>
                    <p>{{ project.description }}</p>
                    <div class="button-row">
                        <a class="button button-small" href="/admin/edit-project/{{ project.id }}">Edit</a>
                        <form action="/admin/delete-project/{{ project.id }}" method="POST" class="inline-form">
                            <button type="submit" class="button button-danger">Delete</button>
                        </form>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <p>No projects yet. Add one to see it on the home page.</p>
        {% endif %}
    </div>
</section>
{% endblock %}
